# Images are imported directly to k3s nodes — no registry needed.
# imagePullPolicy: IfNotPresent means k8s uses the locally imported image.
imagePullPolicy: IfNotPresent

api:
  replicaCount: 2
  image: agm-api
  tag: latest
  allowedOrigin: "https://checkin.reduxit.net"
  authPin: ""  # Do not put the real PIN here — use values.secret.yaml instead

frontend:
  replicaCount: 2
  image: agm-frontend
  tag: latest

postgres:
  image: postgres:16-alpine
  storageClass: local-path   # k3s default; handles the PVC on whichever node postgres lands on
  storageSize: 5Gi
  user: postgres
  password: test
  db: agm_db

pgadmin:
  image: dpage/pgadmin4:latest
  storageSize: 1Gi
  email: admin@example.com  # override in values.secret.yaml
  password: ""              # use values.secret.yaml

cloudflared:
  replicaCount: 2
  tunnelToken: ""  # use values.secret.yaml
