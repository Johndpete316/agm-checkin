server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets from Vite build
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
